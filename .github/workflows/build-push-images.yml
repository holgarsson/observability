name: Build and push observability images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: holgarsson

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [prometheus, loki, alloy, grafana]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: images/${{ matrix.service }}
          push: true
          tags: ghcr.io/holgarsson/obs-${{ matrix.service }}:latest
          provenance: false
