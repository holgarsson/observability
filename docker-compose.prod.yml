x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  prometheus:
    image: ghcr.io/holgarsson/obs-prometheus:latest
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
    networks:
      - obs-internal
    cpus: "0.5"
    mem_limit: 768m
    mem_reservation: 256m
    <<: *logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - obs-internal
    cpus: "0.25"
    mem_limit: 512m
    mem_reservation: 128m
    <<: *logging

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
    networks:
      - obs-internal
    cpus: "0.25"
    mem_limit: 256m
    mem_reservation: 64m
    <<: *logging

  loki:
    image: ghcr.io/holgarsson/obs-loki:latest
    restart: unless-stopped
    volumes:
      - loki-data:/loki
    networks:
      - obs-internal
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 128m
    <<: *logging

  alloy:
    image: ghcr.io/holgarsson/obs-alloy:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - obs-internal
      - logging
    cpus: "0.25"
    mem_limit: 256m
    mem_reservation: 64m
    <<: *logging

  grafana:
    image: ghcr.io/holgarsson/obs-grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3033:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Alert notification delivery (provisioned contact point in
      # images/grafana/provisioning/alerting/contact-points.yaml expands
      # GRAFANA_ALERT_EMAIL_ADDRESSES; Grafana itself expands the GF_SMTP_*
      # vars below). SMTP creds reuse the same Hetzner relay the app already
      # uses for its own transactional email.
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "${GRAFANA_SMTP_HOST}:${GRAFANA_SMTP_PORT}"
      GF_SMTP_USER: ${GRAFANA_SMTP_USER}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_FROM_ADDRESS}
      GF_SMTP_FROM_NAME: "Ops Alerts"
      GRAFANA_ALERT_EMAIL_ADDRESSES: xbrl@xbrl.fo
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - obs-internal
    cpus: "0.5"
    mem_limit: 512m
    mem_reservation: 128m
    <<: *logging

networks:
  obs-internal:
    driver: bridge
  logging:
    external: true

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
